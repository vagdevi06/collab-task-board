name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push server image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/collab-task-board-server:latest ./server
          docker push ${{ secrets.DOCKER_USERNAME }}/collab-task-board-server:latest

      - name: Build and push client image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/collab-task-board-client:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/collab-task-board-client:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/collab-task-board
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker system prune -f