version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  server:
    image: ${DOCKER_USERNAME}/collab-task-board-server:latest
    container_name: server
    restart: always
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/collab-task-board
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  client:
    image: ${DOCKER_USERNAME}/collab-task-board-client:latest
    container_name: client
    restart: always
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server

volumes:
  mongo_data: